info:
  name: Connect to WiFi
  type: http
  seq: 5

http:
  method: post
  url: "{{BaseURL}}/wifi/connect"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "type": "PSK",
        "ssid": "YourWifiSSID",
        "password": "YourWifiPassword"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
