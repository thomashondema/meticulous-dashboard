      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "ssid": "OldWifiSSID"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
