info:
  name: Set WiFi Config
  type: http
  seq: 2

http:
  method: post
  url: "{{BaseURL}}/wifi/config"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "mode": "AP",
        "apName": "Meticulous-AP",
        "apPassword": "change-me-please"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
