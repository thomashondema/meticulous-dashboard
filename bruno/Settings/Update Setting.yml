info:
  name: Update Setting
  type: http
  seq: 3

http:
  method: post
  url: "{{BaseURL}}/settings/"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "auto_preheat": 0,
        "enable_sounds": true
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
