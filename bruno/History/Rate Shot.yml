info:
  name: Rate Shot
  type: http
  seq: 7

http:
  method: post
  url: "{{BaseURL}}/history/rating/:shotId"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: shotId
      value: "1"
      type: path
  body:
    type: json
    data: |
      {
        "rating": "like"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
