info:
  name: Get Timezone Region
  type: http
  seq: 1

http:
  method: get
  url: "{{BaseURL}}/timezones/:region_type?filter="
  headers:
    - name: Accept
      value: application/json
  params:
    - name: filter
      value: ""
      type: query
    - name: region_type
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
