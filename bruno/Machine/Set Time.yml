info:
  name: Set Time
  type: http
  seq: 5

http:
  method: post
  url: "{{BaseURL}}/machine/time"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "date": "2026-04-23T13:05:00.000Z"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
