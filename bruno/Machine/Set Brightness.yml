info:
  name: Set Brightness
  type: http
  seq: 2

http:
  method: post
  url: "{{BaseURL}}/machine/backlight"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "brightness": 70,
        "interpolation": "linear",
        "animation_time": 0.5
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
