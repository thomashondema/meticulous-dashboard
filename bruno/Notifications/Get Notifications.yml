info:
  name: Get Notifications
  type: http
  seq: 1

http:
  method: get
  url: "{{BaseURL}}/notifications?acknowledged="
  headers:
    - name: Accept
      value: application/json
  params:
    - name: acknowledged
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
