info:
  name: Acknowledge Notification
  type: http
  seq: 2

http:
  method: post
  url: "{{BaseURL}}/notifications/acknowledge"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "id": "notification-id",
        "response": "ok"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
