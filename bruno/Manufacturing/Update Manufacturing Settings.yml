info:
  name: Update Manufacturing Settings
  type: http
  seq: 2

http:
  method: post
  url: "{{BaseURL}}/manufacturing"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {
        "enabled": false,
        "skip_stage": false
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
