info:
  name: Update Firmware
  type: http
  seq: 1

http:
  method: post
  url: "{{BaseURL}}/update/firmware"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: multipart/form-data
  body:
    firmware: "./firmware.bin"
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
