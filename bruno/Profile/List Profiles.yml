info:
  name: List Profiles
  type: http
  seq: 2

http:
  method: get
  url: {{BaseURL}}/profile/list?full=true
  headers:
    - name: Accept
      value: application/json
  params:
    - name: full
      value: "true"
      type: query
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
